<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Server Monitoring Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="container">
        <h1>Server Monitoring Dashboard</h1>
        <p class="subtitle">Part 1 - CPU Usage and Memory Usage</p>

        <div class="card-container">
            <div class="card">
                <h2>CPU Usage</h2>
                <p id="cpu">Loading...</p>
            </div>

            <div class="card">
                <h2>Memory Usage</h2>
                <p id="memory">Loading...</p>
            </div>
        </div>

        <p class="time">Last Updated: <span id="time">Loading...</span></p>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
