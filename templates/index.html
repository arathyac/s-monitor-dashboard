<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Server Monitoring Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="dashboard">
    <h1>Server Monitoring Dashboard</h1>
    <p class="subtitle">Real-time server health overview</p>

    <div class="cards">
      <div class="card">
        <h2>CPU Usage</h2>
        <p id="cpuValue">0%</p>
        <div class="progress">
          <div id="cpuBar" class="progress-bar"></div>
        </div>
      </div>

      <div class="card">
        <h2>Memory Usage</h2>
        <p id="memoryValue">0%</p>
        <div class="progress">
          <div id="memoryBar" class="progress-bar"></div>
        </div>
      </div>

      <div class="card">
        <h2>Disk Utilization</h2>
        <p id="diskValue">0%</p>
        <div class="progress">
          <div id="diskBar" class="progress-bar"></div>
        </div>
      </div>
    </div>

    <p class="footer">Last updated: <span id="lastUpdated">--</span></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
